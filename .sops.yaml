creation_rules:
  # yggdrasil's own secrets live in a scoped file, decryptable only by that
  # host (+ the laptops, for editing). This keeps the headless, container-
  # hosting services box OUT of the shared store below — a compromise of it
  # must not expose other hosts' passwords / VPN / cloud creds. First-match
  # wins, so this path_regex rule must precede the catch-all.
  - path_regex: yggdrasil\.yaml$
    key_groups:
      - age:
          - *age_yggdrasil
          - *age_betazed_iammrinal0
          - *age_cardassia_iammrinal0
  # shared store — every host EXCEPT yggdrasil.
